name: Refresh Shows After Deploy

on:
  push:
    branches: [main]
    paths:
      - 'shows/**'

env:
  DEPLOY_WAIT_SECONDS: 120

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Wait for Vercel deployment
        run: sleep $DEPLOY_WAIT_SECONDS

      - name: Trigger show refresh
        run: |
          curl --fail --show-error -X GET "https://syntax.fm/webhooks/refresh" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
